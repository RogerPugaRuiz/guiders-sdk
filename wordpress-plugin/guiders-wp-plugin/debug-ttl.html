<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug TTL - Guiders SDK</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 { color: #4ec9b0; }
        h2 { color: #dcdcaa; margin-top: 30px; }
        .section {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #1177bb; }
        button.danger { background: #d83030; }
        button.danger:hover { background: #e64545; }
        pre {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        .stat {
            display: inline-block;
            background: #2d2d30;
            padding: 10px 15px;
            margin: 5px;
            border-radius: 4px;
            border-left: 3px solid #4ec9b0;
        }
        .stat strong { color: #4ec9b0; }
        .warning { color: #d7ba7d; }
        .error { color: #f48771; }
        .success { color: #4ec9b0; }
    </style>
</head>
<body>
    <h1>🔍 Debug TTL & Payload Limits - Guiders SDK</h1>

    <div class="section">
        <h2>📊 Estado Actual de la Cola</h2>
        <div id="stats"></div>
        <button onclick="refreshStats()">🔄 Actualizar Stats</button>
    </div>

    <div class="section">
        <h2>🗂️ Contenido de localStorage</h2>
        <pre id="localStorage"></pre>
        <button onclick="showLocalStorage()">🔍 Ver localStorage</button>
        <button onclick="analyzeEvents()" class="warning">📋 Analizar Eventos</button>
    </div>

    <div class="section">
        <h2>🧪 Acciones de Prueba</h2>
        <button onclick="addOldEvents()">⏰ Añadir Eventos Antiguos (48h)</button>
        <button onclick="addRecentEvents()">✨ Añadir Eventos Recientes</button>
        <button onclick="manualPrune()">🧹 Ejecutar Pruning Manual</button>
        <button onclick="clearQueue()" class="danger">🗑️ Limpiar Cola Completa</button>
    </div>

    <div class="section">
        <h2>📝 Logs en Tiempo Real</h2>
        <pre id="logs"></pre>
        <button onclick="clearLogs()">🗑️ Limpiar Logs</button>
    </div>

    <script src="http://localhost:8090/wp-content/plugins/guiders-wp-plugin/assets/js/guiders-sdk.js"></script>
    <script>
        let logs = [];
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const emoji = type === 'error' ? '❌' : type === 'warning' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
            const colorClass = type === 'error' ? 'error' : type === 'warning' ? 'warning' : type === 'success' ? 'success' : '';
            
            logs.push(`[${timestamp}] ${emoji} ${message}`);
            
            const logsEl = document.getElementById('logs');
            logsEl.innerHTML = logs.slice(-30).join('\n');
            logsEl.scrollTop = logsEl.scrollHeight;
            
            console.log(`[DEBUG] ${message}`);
        }

        function refreshStats() {
            try {
                const sdk = window.guiders?.trackingPixelSDK;
                if (!sdk) {
                    log('SDK no encontrado en window.guiders', 'error');
                    return;
                }

                const queueManager = sdk.eventQueueManager;
                if (!queueManager) {
                    log('EventQueueManager no encontrado', 'error');
                    return;
                }

                const stats = queueManager.getStats();
                
                const html = `
                    <div class="stat"><strong>Eventos:</strong> ${stats.size} / ${stats.maxSize}</div>
                    <div class="stat"><strong>Uso:</strong> ${stats.utilizationPercent.toFixed(1)}%</div>
                    <div class="stat"><strong>TTL:</strong> ${stats.ttlHours.toFixed(1)}h (${stats.ttlMs}ms)</div>
                    <div class="stat"><strong>Evento más antiguo:</strong> ${stats.oldestEventAgeHours ? stats.oldestEventAgeHours.toFixed(2) + 'h' : 'N/A'}</div>
                    <div class="stat"><strong>Persistencia:</strong> ${stats.persistEnabled ? 'Habilitada' : 'Deshabilitada'}</div>
                `;
                
                document.getElementById('stats').innerHTML = html;
                log(`Stats actualizadas: ${stats.size} eventos, más antiguo: ${stats.oldestEventAgeHours ? stats.oldestEventAgeHours.toFixed(2) + 'h' : 'N/A'}`, 'success');
            } catch (error) {
                log(`Error obteniendo stats: ${error.message}`, 'error');
            }
        }

        function showLocalStorage() {
            try {
                const key = 'guiders_tracking_v2_queue';
                const stored = localStorage.getItem(key);
                
                if (!stored) {
                    document.getElementById('localStorage').textContent = 'Cola vacía en localStorage';
                    log('localStorage vacío', 'warning');
                    return;
                }

                const parsed = JSON.parse(stored);
                const formatted = JSON.stringify(parsed, null, 2);
                
                // Truncar si es muy largo
                const maxLength = 5000;
                const display = formatted.length > maxLength 
                    ? formatted.substring(0, maxLength) + `\n\n... (truncado, total: ${formatted.length} caracteres)`
                    : formatted;
                
                document.getElementById('localStorage').textContent = display;
                log(`localStorage mostrado: ${parsed.length} eventos, ${formatted.length} caracteres`, 'success');
            } catch (error) {
                log(`Error leyendo localStorage: ${error.message}`, 'error');
            }
        }

        function analyzeEvents() {
            try {
                const key = 'guiders_tracking_v2_queue';
                const stored = localStorage.getItem(key);
                
                if (!stored) {
                    log('No hay eventos en localStorage', 'warning');
                    return;
                }

                const events = JSON.parse(stored);
                const now = Date.now();
                const ttl24h = 24 * 60 * 60 * 1000;
                
                let withQueuedAt = 0;
                let withoutQueuedAt = 0;
                let expired = 0;
                let valid = 0;
                let oldestAge = 0;
                let newestAge = Infinity;
                
                events.forEach(event => {
                    if (event.__queuedAt) {
                        withQueuedAt++;
                        const age = now - event.__queuedAt;
                        oldestAge = Math.max(oldestAge, age);
                        newestAge = Math.min(newestAge, age);
                        
                        if (age > ttl24h) {
                            expired++;
                        } else {
                            valid++;
                        }
                    } else {
                        withoutQueuedAt++;
                    }
                });
                
                const analysis = `
📊 Análisis de ${events.length} eventos:

✅ Con __queuedAt: ${withQueuedAt}
❌ Sin __queuedAt: ${withoutQueuedAt}

🕐 Edad:
  - Más antiguo: ${(oldestAge / (60 * 60 * 1000)).toFixed(2)}h
  - Más reciente: ${newestAge === Infinity ? 'N/A' : (newestAge / (60 * 60 * 1000)).toFixed(2) + 'h'}

🧹 TTL (24h):
  - ✅ Válidos: ${valid}
  - ❌ Expirados: ${expired}

${expired > 0 ? '⚠️ HAY EVENTOS EXPIRADOS QUE DEBERÍAN ELIMINARSE' : '✅ No hay eventos expirados'}
${withoutQueuedAt > 0 ? '⚠️ HAY EVENTOS SIN __queuedAt (no se pueden limpiar por TTL)' : '✅ Todos los eventos tienen __queuedAt'}
                `;
                
                document.getElementById('localStorage').textContent = analysis;
                log(`Análisis completado: ${expired} expirados, ${withoutQueuedAt} sin timestamp`, expired > 0 ? 'error' : 'success');
            } catch (error) {
                log(`Error analizando eventos: ${error.message}`, 'error');
            }
        }

        function addOldEvents() {
            try {
                const sdk = window.guiders?.trackingPixelSDK;
                if (!sdk) {
                    log('SDK no encontrado', 'error');
                    return;
                }

                // Añadir eventos con timestamp de hace 48 horas (deberían ser eliminados)
                const oldTimestamp = Date.now() - (48 * 60 * 60 * 1000);
                
                for (let i = 0; i < 10; i++) {
                    const event = {
                        visitorId: sdk.visitorId,
                        sessionId: sdk.sessionId,
                        eventType: 'test_old_event',
                        occurredAt: new Date(oldTimestamp).toISOString(),
                        metadata: { test: true, index: i },
                        __queuedAt: oldTimestamp
                    };
                    
                    sdk.eventQueueManager.enqueue(event);
                }
                
                log('✅ Añadidos 10 eventos antiguos (48h)', 'success');
                refreshStats();
            } catch (error) {
                log(`Error añadiendo eventos antiguos: ${error.message}`, 'error');
            }
        }

        function addRecentEvents() {
            try {
                const sdk = window.guiders?.trackingPixelSDK;
                if (!sdk) {
                    log('SDK no encontrado', 'error');
                    return;
                }

                for (let i = 0; i < 10; i++) {
                    const event = {
                        visitorId: sdk.visitorId,
                        sessionId: sdk.sessionId,
                        eventType: 'test_recent_event',
                        occurredAt: new Date().toISOString(),
                        metadata: { test: true, index: i }
                    };
                    
                    sdk.eventQueueManager.enqueue(event);
                }
                
                log('✅ Añadidos 10 eventos recientes', 'success');
                refreshStats();
            } catch (error) {
                log(`Error añadiendo eventos recientes: ${error.message}`, 'error');
            }
        }

        function manualPrune() {
            try {
                const sdk = window.guiders?.trackingPixelSDK;
                if (!sdk) {
                    log('SDK no encontrado', 'error');
                    return;
                }

                const queueManager = sdk.eventQueueManager;
                const beforeSize = queueManager.size();
                
                // Ejecutar pruning manual
                const pruned = queueManager.pruneExpiredEvents();
                
                const afterSize = queueManager.size();
                
                log(`🧹 Pruning ejecutado: ${beforeSize} → ${afterSize} eventos (eliminados: ${pruned})`, pruned > 0 ? 'success' : 'warning');
                refreshStats();
            } catch (error) {
                log(`Error ejecutando pruning: ${error.message}`, 'error');
            }
        }

        function clearQueue() {
            if (!confirm('¿Estás seguro de que quieres limpiar toda la cola?')) {
                return;
            }
            
            try {
                const sdk = window.guiders?.trackingPixelSDK;
                if (!sdk) {
                    log('SDK no encontrado', 'error');
                    return;
                }

                sdk.eventQueueManager.clear();
                log('🗑️ Cola limpiada completamente', 'success');
                refreshStats();
            } catch (error) {
                log(`Error limpiando cola: ${error.message}`, 'error');
            }
        }

        function clearLogs() {
            logs = [];
            document.getElementById('logs').textContent = '';
            log('Logs limpiados', 'success');
        }

        // Auto-inicialización
        window.addEventListener('load', () => {
            log('🚀 Página de debug cargada', 'success');
            
            setTimeout(() => {
                if (window.guiders?.trackingPixelSDK) {
                    log('✅ SDK detectado', 'success');
                    refreshStats();
                } else {
                    log('⚠️ SDK no detectado, esperando...', 'warning');
                    setTimeout(() => {
                        if (window.guiders?.trackingPixelSDK) {
                            log('✅ SDK detectado (retry)', 'success');
                            refreshStats();
                        } else {
                            log('❌ SDK no se pudo cargar', 'error');
                        }
                    }, 2000);
                }
            }, 1000);
        });
    </script>
</body>
</html>
