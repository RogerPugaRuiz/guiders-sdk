  /api/protected:
    get:
      description: >-
        Endpoint de diagnóstico que requiere un JWT válido. Útil para verificar que la autenticación Bearer está
        correctamente configurada en el cliente.
      operationId: app_getProtected
      parameters: []
      responses:
        '200':
          description: Token válido; acceso concedido.
          content:
            application/json:
              schema:
                type: string
                example: This is a protected route
        '401':
          description: 'No autenticado: faltan credenciales, token ausente, inválido o expirado.'
        '403':
          description: 'Acceso denegado: el usuario autenticado no tiene permisos suficientes para esta operación.'
      security:
        - bearer: []
      summary: Endpoint de prueba protegido por JWT
      tags: *ref_65
info:
  title: API Guiders Backend
  description: |-
    Documentación oficial de la API REST del backend de Guiders.

    ## Autenticación

    La API soporta tres mecanismos de autenticación:

    - **Bearer JWT** (`Authorization: Bearer <token>`): para clientes que
      gestionan tokens manualmente (apps móviles, integraciones backend).
    - **Cookie de sesión** (`access_token`, `sid`, `session`): para
      frontends web que usan el flujo BFF (Backend-for-Frontend) con
      cookies HttpOnly.
    - **API Key** (`x-api-key`): para SDK de tracking embebido en sitios
      de clientes y para integraciones server-to-server.

    La mayoría de endpoints administrativos aceptan tanto Bearer JWT como
    cookie de sesión (auth dual). Los endpoints de ingesta de eventos
    suelen requerir API Key.

    ## Convenciones

    - Todos los identificadores son UUID v4.
    - Las fechas siguen ISO 8601 (`YYYY-MM-DDTHH:mm:ss.sssZ`).
    - Los errores siguen el formato estándar de NestJS:
      `{ statusCode, message, error }`.
    - Las operaciones de listado soportan paginación cursor-based.
  version: 0.0.1
  contact:
    name: Equipo Guiders
    url: https://github.com/anomalyco/guiders-backend
    email: support@guiders.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
tags:
  - name: Autenticación de Usuarios
    description: Autenticación y emisión de tokens para usuarios
  - name: BFF Auth
    description: Backend-for-Frontend de autenticación basado en cookies
  - name: API Keys
    description: Gestión de API Keys de tenants
  - name: integration-api-keys
    description: API Keys de integración REST para developers externos
  - name: Chats V2
    description: Conversaciones (V2 - MongoDB)
  - name: Messages V2
    description: Mensajes de conversaciones (V2 - MongoDB)
  - name: Presence & Typing
    description: Estado de presencia en chats
  - name: Reglas de Auto-asignamiento
    description: Reglas de asignación automática de comerciales
  - name: visitors
    description: Visitantes y sesiones de tracking
  - name: Visitantes
    description: Visitantes (V1 - legacy, PostgreSQL)
  - name: Site Visitors Management
    description: Gestión de visitantes por sitio
  - name: Tenant Visitors Management
    description: Gestión de visitantes por tenant
  - name: sites
    description: Sitios web monitorizados
  - name: tracking-v2
    description: Ingesta de eventos de tracking
  - name: Leads - Administración CRM
    description: Gestión de leads y contactos comerciales (admin)
  - name: Leads - Contact Data
    description: Datos de contacto de leads
  - name: LLM Suggestions
    description: Sugerencias de IA para comerciales
  - name: LLM Configuration
    description: Configuración de modelos de lenguaje
  - name: White Label Configuration
    description: Configuración white-label por compañía
  - name: Commercials
    description: Operaciones comerciales
  - name: companies
    description: Gestión de compañías y tenants
  - name: Consent
    description: Gestión de consentimientos y RGPD
  - name: Pixel Visitor Auth
    description: Autenticación de visitantes para el pixel de tracking
  - name: JWKS
    description: Claves públicas de verificación JWT (JWKS)
  - name: health
    description: Endpoints de salud y diagnóstico
  - name: internal-opensearch
    description: Endpoints internos de diagnóstico OpenSearch
servers:
  - url: https://api.guiders.ai
    description: Producción
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Token JWT emitido por el servidor de autenticación
    access_token:
      type: apiKey
      in: cookie
      name: access_token
      description: Cookie HttpOnly emitida por el flujo BFF
    cookie:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Cookie de sesión por defecto (express-session)
    sid:
      type: apiKey
      in: cookie
      name: sid
      description: Cookie de sesión utilizada por el handshake Socket.IO
    session:
      type: apiKey
      in: cookie
      name: session
      description: Cookie de sesión legacy
    api-key:
      type: apiKey
      in: header
      name: x-api-key
      description: API Key del tenant para ingesta de eventos del SDK
  schemas:
    TokenRequestDto:
      type: object
      properties:
        client:
          type: number
          example: 12345
          description: Identificador numérico del cliente (session / visitor id) generado por el script del pixel
      required:
        - client
    TokensResponseDto:
      type: object
      properties:
        access_token:
          type: string
          description: JWT de acceso (corto plazo)
        refresh_token:
          type: string
          description: Refresh token (largo plazo)
      required:
        - access_token
        - refresh_token
    RegisterVisitorRequestDto:
      type: object
      properties:
        apiKey:
          type: string
          example: gdr_live_abc123
          description: API Key pública asociada a la compañía (dominio autorizado)
        client:
          type: number
          example: 12345
          description: Identificador numérico del cliente (session / visitor id) generado por el script del pixel
        userAgent:
          type: string
          example: Mozilla/5.0 (Macintosh; Intel Mac OS X 14_5)...
          description: User-Agent capturado en el navegador del visitante
      required:
        - apiKey
        - client
        - userAgent
    VisitorRefreshTokenRequestDto:
      type: object
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          description: Refresh token previamente emitido
      required:
        - refresh_token
    AccessTokenResponseDto:
      type: object
      properties:
        access_token:
          type: string
          description: Nuevo JWT de acceso
      required:
        - access_token
    PixelMetadataResponseDto:
      type: object
      properties:
        tenantId:
          type: string
          description: UUID del tenant (company)
          example: a1b2c3d4-e5f6-4a1b-8c9d-0e1f2a3b4c5d
        siteId:
          type: string
          description: UUID del sitio
          example: b2c3d4e5-f6a7-4b2c-9d0e-1f2a3b4c5d6e
        domain:
          type: string
          description: Dominio del sitio
          example: example.com
      required:
        - tenantId
        - siteId
        - domain
    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          description: El correo electrónico del usuario
          example: usuario@ejemplo.com
        password:
          type: string
          description: La contraseña del usuario
          example: Password123!
      required:
        - email
        - password
    TokenResponseDto:
      type: object
      properties:
        access_token:
          type: string
          description: Token de acceso JWT
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          description: Token de actualización JWT para renovar el token de acceso
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      required:
        - access_token
        - refresh_token
    RegisterRequestDto:
      type: object
      properties:
        email:
          type: string
          description: El correo electrónico del usuario
          example: usuario@ejemplo.com
        name:
          type: string
          description: El nombre del usuario (opcional)
          example: Juan Pérez
        password:
          type: string
          description: >-
            La contraseña del usuario (mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter
            especial)
          example: Password123!
        roles:
          description: Roles asignados al usuario (opcional, por defecto "commercial")
          example:
            - commercial
          type: array
          items:
            type: string
      required:
        - email
        - password
    RefreshTokenRequestDto:
      type: object
      properties:
        refresh_token:
          type: string
          description: Token de actualización para renovar el token de acceso
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      required:
        - refresh_token
    RefreshTokenResponseDto:
      type: object
      properties:
        access_token:
          type: string
          description: Nuevo token de acceso JWT
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      required:
        - access_token
    AcceptInviteRequestDto:
      type: object
      properties:
        token:
          type: string
          description: Token de invitación recibido por correo electrónico
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        password:
          type: string
          description: >-
            La contraseña del usuario (mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter
            especial)
          example: Password123!
      required:
        - token
        - password
    UserListItemDto:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        roles:
          type: array
          items:
            type: string
        companyId:
          type: string
        isActive:
          type: boolean
          default: true
        keycloakId:
          type: object
          nullable: true
        createdAt:
          format: date-time
          type: string
        lastLoginAt:
          type: object
          nullable: true
      required:
        - id
        - email
        - name
        - roles
        - companyId
        - isActive
        - createdAt
    UserListResponseDto:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserListItemDto'
      required:
        - users
    CurrentUserResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Identificador único del usuario
        email:
          type: string
          description: Correo electrónico del usuario
        name:
          type: string
          description: Nombre visible del usuario
        roles:
          description: Roles asignados
          type: array
          items:
            type: string
        companyId:
          type: string
          description: Identificador de la compañía asociada
        isActive:
          type: boolean
          description: Indica si el usuario está activo
        createdAt:
          type: string
          format: date-time
          description: Fecha de creación
        updatedAt:
          type: string
          format: date-time
