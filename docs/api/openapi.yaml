          schema:
            type: object
            additionalProperties: true
            $ref: '#/components/schemas/ChatFiltersDto'
        - name: sort
          required: false
          in: query
          description: 'Opciones de ordenamiento en formato JSON serializado. Ej: {"createdAt":"desc"}'
          schema:
            type: object
            additionalProperties: true
            $ref: '#/components/schemas/ChatSortDto'
        - name: X-Guiders-Session
          in: header
          description: Session ID como cabecera HTTP alternativa para BFF
          required: false
          schema:
            type: string
            example: sess_1758226307441_commercial
      responses:
        '200':
          description: Lista de chats del comercial obtenida exitosamente
          content:
