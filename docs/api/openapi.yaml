            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
        - name: X-Guiders-Sid
          in: header
          description: Session ID del visitante como cabecera HTTP alternativa
          required: false
          schema:
            type: string
            example: temp_1758226307441_5bjqvmz1vf3
