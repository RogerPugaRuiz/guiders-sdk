openapi: 3.0.0
paths:
  /api/pixel/token:
    post:
      description: >-
        Devuelve access_token y refresh_token para un visitor previamente registrado. Requiere cabeceras Origin y
        Referer con mismo hostname.
      operationId: auth-visitor_getToken
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequestDto'
      responses:
        '201':
          description: Tokens emitidos correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponseDto'
        '400':
          description: Origin/Referer inválidos o no coinciden
        '404':
          description: Visitor o client no encontrado / dominio inválido
      security:
        - {}
      summary: Obtener par de tokens para visitante existente
      tags: &ref_0
        - Pixel Visitor Auth
  /api/pixel/register:
    post:
      description: >-
        Registra un visitante si no existe (por apiKey + client + dominio) y devuelve tokens. Si ya existe, re-emite
        tokens.
      operationId: auth-visitor_register
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterVisitorRequestDto'
      responses:
        '201':
          description: 'Visitante registrado o existente: tokens emitidos'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponseDto'
        '400':
          description: Dominio inválido / Origin-Referer no coinciden
        '404':
          description: API Key o Visitor no encontrado
      security:
        - {}
      summary: Registrar visitante + emitir tokens
      tags: *ref_0
  /api/pixel/token/refresh:
    post:
      description: Devuelve un nuevo access_token válido a partir de refresh_token.
      operationId: auth-visitor_refresh
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitorRefreshTokenRequestDto'
      responses:
        '201':
          description: Access token renovado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponseDto'
        '401':
          description: Refresh token inválido
      security:
        - {}
      summary: Refrescar access token
      tags: *ref_0
  /api/pixel/metadata:
    get:
      description: >-
        Devuelve tenantId y siteId necesarios para tracking basándose en el apiKey proporcionado. Este endpoint permite
        al frontend obtener los identificadores internos sin necesidad de conocer el dominio o realizar validaciones
        complejas.
      operationId: auth-visitor_getMetadata
      parameters:
        - name: apiKey
          required: true
          in: query
          description: API Key pública del sitio
          schema:
            example: 12ca17b49af2289436f303e0166030a21e525d266e209267433801a8fd4071a0
            type: string
      responses:
        '200':
          description: Metadatos obtenidos exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PixelMetadataResponseDto'
        '400':
          description: API Key no proporcionada o formato inválido
        '404':
          description: API Key no encontrada o inválida
      security:
        - {}
      summary: Obtener metadatos del sitio por API Key
      tags: *ref_0
  /api/user/auth/login:
    post:
      description: Verifica las credenciales y devuelve tokens de acceso y actualización
      operationId: auth-user_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Usuario autenticado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponseDto'
        '400':
          description: Error de validación (formato de email incorrecto)
        '401':
          description: Credenciales inválidas
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Iniciar sesión de usuario
      tags: &ref_1
        - Autenticación de Usuarios
  /api/user/auth/register:
    post:
      description: Crea un nuevo usuario en el sistema con el rol especificado
      operationId: auth-user_register
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestDto'
      responses:
        '200':
          description: Usuario registrado correctamente
        '400':
          description: Error de validación (formato de email incorrecto, contraseña no cumple requisitos)
        '409':
          description: El usuario ya existe
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Registrar un nuevo usuario
      tags: *ref_1
  /api/user/auth/refresh:
    post:
      description: Utiliza un token de actualización para obtener un nuevo token de acceso
      operationId: auth-user_refresh
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestDto'
      responses:
        '200':
          description: Token renovado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponseDto'
        '400':
          description: Error de validación (token mal formado)
        '401':
          description: Token de actualización inválido o expirado
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Renovar token de acceso
      tags: *ref_1
  /api/user/auth/logout:
    post:
      description: Cierra la sesión del usuario y revoca sus tokens
      operationId: auth-user_logout
      parameters: []
      responses:
        '200':
          description: Sesión cerrada correctamente
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Cerrar sesión
      tags: *ref_1
  /api/user/auth/validate:
    get:
      description: Verifica que el token de acceso sea válido
      operationId: auth-user_validate
      parameters:
        - name: Authorization
          required: true
          in: header
          description: Token de acceso con formato Bearer
          schema:
            type: string
            default: Bearer <token>
      responses:
        '204':
          description: Token válido
        '400':
          description: Error de validación (token mal formado)
        '401':
          description: Token inválido o expirado
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Validar token de acceso
      tags: *ref_1
  /api/user/auth/accept-invite:
    post:
      description: Acepta una invitación para unirse a una compañía y establece la contraseña
      operationId: auth-user_acceptInvite
      parameters: []
      requestBody:
        required: true
        description: Datos para aceptar la invitación
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequestDto'
      responses:
        '200':
          description: Invitación aceptada correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invitación aceptada correctamente
        '400':
          description: Error de validación (token inválido o contraseña no cumple requisitos)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
        '401':
          description: Token de invitación inválido o expirado
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Aceptar invitación
      tags: *ref_1
  /api/user/auth/company-users:
    get:
      description: Devuelve los usuarios asociados a la compañía del token JWT
      operationId: auth-user_listCompanyUsers
      parameters: []
      responses:
        '200':
          description: Listado de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponseDto'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Listar usuarios de la compañía
      tags: *ref_1
  /api/user/auth/me:
    get:
      description: >-
        Devuelve la información del usuario asociado al token de acceso o sesión BFF. Soporta JWT Bearer tokens y
        cookies de Keycloak. Requiere rol admin o commercial.
      operationId: auth-user_me
      parameters: []
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponseDto'
        '401':
          description: No autorizado
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Obtener usuario autenticado
      tags: *ref_1
  /api/user/auth/{keycloakId}:
    get:
      description: >-
        Devuelve la información de un usuario específico usando su Keycloak ID (sub del token JWT). Requiere
        autenticación.
      operationId: auth-user_getUserById
      parameters:
        - name: keycloakId
          required: true
          in: path
          description: Keycloak ID del usuario (sub del token JWT de Keycloak)
          schema:
            example: d9b32cfd-f838-4764-b03f-465ed59ce245
            type: string
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponseDto'
        '401':
          description: No autorizado
        '404':
          description: Usuario no encontrado con ese Keycloak ID
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Obtener usuario por Keycloak ID
      tags: *ref_1
  /api/user/auth/sync-with-keycloak:
    post:
      description: Crea un nuevo usuario en el backend y lo vincula con un usuario existente de Keycloak
      operationId: auth-user_syncWithKeycloak
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncUserWithKeycloakDto'
      responses:
        '201':
          description: Usuario sincronizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncUserResponseDto'
        '400':
          description: Datos inválidos
        '409':
          description: Usuario ya existe o Keycloak ID ya está vinculado
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Sincronizar usuario con Keycloak
      tags: *ref_1
  /api/user/auth/verify-role-mapping:
    post:
      description: Verifica cómo se mapearían los roles de Keycloak a roles del backend sin crear usuario
      operationId: auth-user_verifyRoleMapping
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRoleMappingDto'
      responses:
        '200':
          description: Resultado de la verificación del mapeo de roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyRoleMappingResponseDto'
        '400':
          description: Datos inválidos
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Verificar mapeo de roles de Keycloak
      tags: *ref_1
  /api/user/auth/{keycloakId}/avatar:
    post:
      description: >-
        Permite a un usuario subir su avatar o a un admin subir el avatar de cualquier usuario. Formatos permitidos:
        PNG, JPG. Tamaño máximo: 5MB. Requiere Keycloak ID.
      operationId: auth-user_uploadAvatar
      parameters:
        - name: keycloakId
          required: true
          in: path
          description: Keycloak ID del usuario (sub del token JWT de Keycloak)
          schema:
            example: d9b32cfd-f838-4764-b03f-465ed59ce245
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo de imagen (PNG o JPG, máx 5MB)
              required:
                - file
      responses:
        '200':
          description: Avatar actualizado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatarUrl:
                    type: string
                    example: https://bucket.s3.region.amazonaws.com/avatars/user-id.jpg
                  message:
                    type: string
                    example: Avatar actualizado exitosamente
        '400':
          description: Archivo inválido o no proporcionado
        '401':
          description: No autorizado
        '403':
          description: Sin permisos para actualizar este avatar
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Subir o actualizar avatar del usuario
      tags: *ref_1
    delete:
      description: >-
        Permite a un usuario eliminar su avatar o a un admin eliminar el avatar de cualquier usuario. Requiere Keycloak
        ID.
      operationId: auth-user_deleteAvatar
      parameters:
        - name: keycloakId
          required: true
          in: path
          description: Keycloak ID del usuario (sub del token JWT de Keycloak)
          schema:
            example: d9b32cfd-f838-4764-b03f-465ed59ce245
            type: string
      responses:
        '200':
          description: Avatar eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Avatar eliminado exitosamente
        '401':
          description: No autorizado
        '403':
          description: Sin permisos para eliminar este avatar
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Eliminar avatar del usuario
      tags: *ref_1
  /api/bff/auth/login:
    get:
      description: >-
        Inicia el flujo OIDC con PKCE. Guarda returnTo en sesión y redirige al proveedor OIDC. Uso por defecto para la
        app console.
      operationId: bff_login
      parameters:
        - name: redirect
          required: false
          in: query
          description: URL a la que volver tras autenticación. Validada contra ALLOW_RETURN_TO.
          schema: {}
      responses:
        '302':
          description: Redirección a proveedor OIDC
        '400':
          description: Parámetros inválidos
      security:
        - {}
      summary: Iniciar login OIDC (console)
      tags: &ref_2
        - BFF Auth
  /api/bff/auth/login/{app}:
    get:
      description: Inicia el flujo OIDC para una app específica (console|admin). Guarda returnTo y redirige al proveedor OIDC.
      operationId: bff_loginForApp
      parameters:
        - name: app
          required: true
          in: path
          schema:
            enum:
              - console
              - admin
            type: string
        - name: redirect
          required: false
          in: query
          description: URL a la que volver tras autenticación. Validada contra ALLOW_RETURN_TO.
          schema: {}
      responses:
        '302':
          description: Redirección a proveedor OIDC
        '400':
          description: Parámetros inválidos
      security:
        - {}
      summary: Iniciar login OIDC para app
      tags: *ref_2
  /api/bff/auth/callback/{app}:
    get:
      description: >-
        Procesa el callback OIDC, emite cookies HttpOnly (session/refresh) y redirige a returnTo. Si hay error de
        sesión, reintenta login.
      operationId: bff_callback
      parameters:
        - name: app
          required: true
          in: path
          schema:
            enum:
              - console
              - admin
            type: string
      responses:
        '302':
          description: |-
            Redirección a login en caso de error

            Redirección a returnTo tras login
        '400':
          description: Callback inválido
      security:
        - {}
      summary: Callback OIDC
      tags: *ref_2
  /api/bff/auth/me:
    get:
      description: >-
        Devuelve información del usuario autenticado obtenida desde la base de datos, incluyendo companyId. Requiere
        cookie de sesión válida.
      operationId: bff_me
      parameters: []
      responses:
        '200':
          description: Información del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BFFMeResponseDto'
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado, JWT inválido o usuario no encontrado
      security:
        - {}
      summary: Obtener información del usuario autenticado (console)
      tags: *ref_2
  /api/bff/auth/me/{app}:
    get:
      description: >-
        Devuelve información del usuario autenticado obtenida desde la base de datos para la app indicada
        (console|admin), incluyendo companyId. Requiere cookie de sesión válida.
      operationId: bff_meForApp
      parameters:
        - name: app
          required: true
          in: path
          schema:
            enum:
              - console
              - admin
            type: string
      responses:
        '200':
          description: Información del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BFFMeResponseDto'
        '400':
          description: Solicitud inválida
        '401':
          description: No autenticado, JWT inválido o usuario no encontrado
      security:
        - {}
      summary: Obtener información del usuario autenticado (app)
      tags: *ref_2
  /api/bff/auth/refresh:
    post:
      description: Renueva la cookie de sesión usando el refresh token HttpOnly. Responde 204 sin contenido si OK.
      operationId: bff_refresh
      parameters: []
      responses:
        '204':
          description: Sesión renovada
        '400':
          description: Solicitud inválida
        '401':
          description: Refresh token ausente o inválido
      security:
        - {}
      summary: Refrescar sesión (console)
      tags: *ref_2
  /api/bff/auth/refresh/{app}:
    post:
      description: >-
        Renueva la cookie de sesión para la app indicada (console|admin) usando el refresh token HttpOnly. Responde 204
        si OK.
      operationId: bff_refreshForApp
      parameters:
        - name: app
          required: true
          in: path
          schema:
            enum:
              - console
              - admin
            type: string
      responses:
        '204':
          description: Sesión renovada
        '400':
          description: Solicitud inválida
        '401':
          description: Refresh token ausente o inválido
      security:
        - {}
      summary: Refrescar sesión (app)
      tags: *ref_2
  /api/bff/auth/logout:
    get:
      description: Revoca refresh token si existe, limpia cookies y redirige a /api/bff/auth/login/console.
      operationId: bff_logout
      parameters: []
      responses:
        '302':
          description: Redirige a /login/console
        '400':
          description: Solicitud inválida
      security:
        - {}
      summary: Cerrar sesión (console)
      tags: *ref_2
  /api/bff/auth/logout/{app}:
    get:
      description: Revoca refresh token si existe, limpia cookies y redirige a /api/bff/auth/login/:app.
      operationId: bff_logoutForApp
      parameters:
        - name: app
          required: true
          in: path
          schema:
            enum:
              - console
              - admin
            type: string
      responses:
        '302':
          description: Redirige a /login/:app
        '400':
          description: Solicitud inválida
      security:
        - {}
      summary: Cerrar sesión (app)
      tags: *ref_2
  /api/api-keys/create:
    post:
      description: >-
        Genera una nueva API Key asociada a un dominio y compañía. Si el dominio ya tiene una API Key se reutiliza en
        lugar de crear una nueva.
      operationId: api-key_createApiKey
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequestDto'
      responses:
        '201':
          description: API Key creada o reutilizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponseDto'
        '400':
          description: Datos inválidos
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Crear (o reutilizar) API Key para un dominio
      tags: &ref_3
        - API Keys
  /api/api-keys/company:
    get:
      description: Devuelve las API Keys asociadas a la compañía incluida en el token JWT (requiere rol admin).
      operationId: api-key_listCompanyApiKeys
      parameters: []
      responses:
        '200':
          description: Listado obtenido correctamente
        '401':
          description: 'No autenticado: faltan credenciales, token ausente, inválido o expirado.'
        '403':
          description: 'Acceso denegado: el usuario autenticado no tiene permisos suficientes para esta operación.'
        '500':
          description: Error interno del servidor
      security:
        - bearer: []
      summary: Listar API Keys de la compañía
      tags: *ref_3
  /jwks:
    get:
      description: >-
        Devuelve el conjunto de claves públicas (JWKS) expuestas por el sistema para verificación de firmas JWT.
        Endpoint público conforme al estándar RFC 7517.
      operationId: jwks_getJwks
      parameters: []
      responses:
        '200':
          description: JWKS actual con todas las claves públicas activas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponseDto'
        '400':
          description: Petición inválida.
        '500':
          description: Error al recuperar JWKS
      security:
        - {}
      summary: Obtener JWKS público
      tags:
        - JWKS
  /api/integration-api-keys:
    post:
      description: >-
        Genera una nueva API Key para llamar a la API pública de Guiders desde un backend externo. El token solo se
        devuelve una vez: guárdalo de forma segura.
      operationId: integration-api-key_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationApiKeyDto'
      responses:
        '201':
          description: API Key creada. El token solo se muestra en esta respuesta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationApiKeyCreatedResponseDto'
        '401': &ref_4
          description: 'No autenticado: faltan credenciales, token ausente, inválido o expirado.'
        '403': &ref_5
          description: 'Acceso denegado: el usuario autenticado no tiene permisos suficientes para esta operación.'
      security: &ref_6
        - bearer: []
      summary: Crear API Key de integración
      tags: &ref_7
        - integration-api-keys
    get:
      description: Devuelve todas las API Keys de integración de la compañía. No incluye los tokens completos.
      operationId: integration-api-key_list
      parameters: []
      responses:
        '200':
          description: Listado de API Keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntegrationApiKeyListItemDto'
        '401': *ref_4
        '403': *ref_5
      security: *ref_6
      summary: Listar API Keys de integración
      tags: *ref_7
  /api/integration-api-keys/{id}:
    delete:
      description: Revoca una API Key de integración. No se puede deshacer.
      operationId: integration-api-key_revoke
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: API Key revocada
        '401': *ref_4
        '403': *ref_5
        '404':
          description: API Key no encontrada
        '409':
          description: La API Key ya está revocada
      security: *ref_6
      summary: Revocar API Key de integración
      tags: *ref_7
  /api/integration/conversations:
    post:
      operationId: integration_createConversation
      parameters:
        - &ref_8
          name: x-api-key
          in: header
          description: Integration API Key (gdr_live_xxx o gdr_test_xxx)
          required: true
