                properties:
                  statusCode:
                    type: number
                    example: 401
                  message:
                    type: string
                    example: Se requiere autenticación - Bearer token o sesión de cookie
                  error:
                    type: string
                    example: Unauthorized
        '403':
          description: Usuario sin permisos suficientes - Requiere rol de comercial, administrador o supervisor
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 403
                  message:
                    type: string
                    example: Acceso denegado. Permisos insuficientes.
                  error:
                    type: string
                    example: Forbidden
        '500':
          description: Error interno del servidor
      security:
        - access_token: []
        - bearer: []
        - session: []
        - bearer: []
