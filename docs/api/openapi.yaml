  /api/visitors/identify:
    post:
      description: >-
        Registra o actualiza un visitante en el sistema usando dominio y API Key. El sistema valida automáticamente la
        API Key contra el dominio proporcionado, resuelve el tenantId y siteId internamente, y procede a identificar al
        visitante. Si el fingerprint ya existe en el sitio, actualiza al visitante existente. Si no existe, crea un
        nuevo Visitor en estado inicial (anónimo). Inicia una nueva Session asociada al visitante y devuelve un
        identificador de sesión en cookie HttpOnly.
      operationId: visitor-v2_identifyVisitor
      parameters: []
      requestBody:
        required: true
        description: Datos del visitante para identificación
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifyVisitorDto'
            examples:
              example1:
                summary: Visitante nuevo
                description: Ejemplo de identificación de un visitante nuevo con todos los campos
                value:
                  fingerprint: fp_1234567890abcdef
                  domain: landing.mytech.com
                  apiKey: ak_live_1234567890abcdef
                  currentUrl: https://landing.mytech.com/home
                  hasAcceptedPrivacyPolicy: true
              example2:
                summary: Visitante mínimo
                description: Ejemplo con campos mínimos requeridos
                value:
                  fingerprint: fp_abcdef1234567890
                  domain: blog.mytech.com
                  apiKey: ak_live_abcdef1234567890
                  hasAcceptedPrivacyPolicy: true
      responses:
        '200':
          description: Visitante identificado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentifyVisitorResponseDto'
        '400':
          description: Datos inválidos proporcionados (campos faltantes, formato incorrecto, API Key inválida)
        '401':
          description: API Key no válida para el dominio proporcionado
        '404':
          description: Dominio no encontrado en el sistema
        '500':
          description: Error interno del servidor
      security:
        - {}
      summary: Identificar visitante
      tags: &ref_13
        - visitors
  /api/visitors/session/heartbeat:
    post:
      description: >-
        Renueva el TTL de la sesión de un visitante en Redis. Llamado periódicamente por el SDK
        (cada 30 segundos) mientras el visitante está activo en la página.
        No modifica el aggregate ni emite eventos de dominio — solo actualiza la actividad en Redis.
      operationId: visitor-v2_heartbeat
      parameters:
        - name: x-guiders-sid
          in: header
          required: false
          schema:
            type: string
          description: Session ID del visitante (alternativa al body.sessionId y a la cookie)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HeartbeatDto'
      responses:
        '200':
          description: Sesión renovada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Sesión renovada
        '400':
          description: SessionId no proporcionado
        '401':
          description: Sesión inválida o expirada
      security:
        - {}
      summary: Mantener sesión de visitante activa
      tags: *ref_13
