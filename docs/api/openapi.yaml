          description: Petición inválida.
        '500':
          description: Error interno del servidor.
      security:
        - {}
      summary: Mensaje de bienvenida
      tags: &ref_65
        - health
  /health:
    head:
      description: >-
        Endpoint ligero de health check. Responde 200 OK sin cuerpo. Pensado para probes de orquestadores (Kubernetes,
        load balancers) que solo necesitan verificar disponibilidad.
      operationId: app_healthCheck
      parameters: []
      responses:
        '200':
          description: El servicio está disponible.
        '400':
          description: Petición inválida.
        '500':
          description: Error interno del servidor.
      security:
        - {}
      summary: Health check (HEAD)
      tags: *ref_65
  /api/websocket-test:
