            - ASSIGNED
            - ACTIVE
            - CLOSED
            - TRANSFERRED
            - ABANDONED
          example: PENDING
        priority:
          type: string
          description: Prioridad del chat
          enum:
            - LOW
            - MEDIUM
            - NORMAL
            - HIGH
            - URGENT
          example: NORMAL
