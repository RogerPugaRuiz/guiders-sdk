            category: Electronics
            duration: 45
        occurredAt:
          type: string
          description: Fecha y hora en que ocurrió el evento (ISO 8601). Si no se proporciona, se usa la hora del servidor.
          example: '2024-01-15T10:30:00.000Z'
        __queuedAt:
          type: number
          description: >-
            Timestamp en milisegundos de cuándo el evento fue encolado en el cliente antes de enviarse al backend. Se
            usa para calcular latencia de transmisión y detectar eventos retrasados.
          example: 1771064528320
        aggregatedCount:
          type: number
          description: >-
            Número de eventos idénticos que fueron agregados en el cliente antes de enviar. Por defecto es 1. Valores
            mayores indican que se consolidaron múltiples eventos duplicados.
          example: 1
        firstOccurredAt:
          type: string
          description: Fecha y hora (ISO 8601) del primer evento en caso de agregación. Solo presente cuando aggregatedCount > 1.
          example: '2024-01-15T10:30:00.000Z'
        lastOccurredAt:
          type: string
          description: Fecha y hora (ISO 8601) del último evento en caso de agregación. Solo presente cuando aggregatedCount > 1.
          example: '2024-01-15T10:30:15.000Z'
      required:
        - visitorId
        - sessionId
        - eventType
        - metadata
    IngestTrackingEventsBatchDto:
      type: object
      properties:
        tenantId:
          type: string
          description: ID del tenant (empresa) que envía los eventos
          example: c3d4e5f6-a7b8-4c5d-9e0f-1a2b3c4d5e6f
        siteId:
          type: string
          description: ID del sitio web desde donde se generan los eventos
          example: d4e5f6a7-b8c9-4d5e-0f1a-2b3c4d5e6f7a
        events:
          description: Array de eventos de tracking (mínimo 1, máximo 500 por batch)
          example:
            - visitorId: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
              sessionId: b2c3d4e5-f6a7-4b5c-9d0e-1f2a3b4c5d6e
              eventType: PAGE_VIEW
              metadata:
                url: /home
                title: Home Page
              occurredAt: '2024-01-15T10:30:00.000Z'
            - visitorId: a1b2c3d4-e5f6-4a5b-8c9d-0e1f2a3b4c5d
              sessionId: b2c3d4e5-f6a7-4b5c-9d0e-1f2a3b4c5d6e
              eventType: CLICK
              metadata:
                element: button
                id: cta-signup
              occurredAt: '2024-01-15T10:30:15.000Z'
          type: array
          items:
            $ref: '#/components/schemas/IngestTrackingEventDto'
      required:
        - tenantId
        - siteId
        - events
    IngestEventsResponseDto:
      type: object
      properties:
        success:
          type: boolean
          description: Indica si la ingesta fue exitosa
          example: true
        received:
          type: number
          description: Número de eventos recibidos
          example: 120
        processed:
          type: number
          description: Número de eventos procesados después de throttling
          example: 95
        discarded:
          type: number
          description: Número de eventos descartados por throttling
